name: companion_for_virus
description: "Companion app for the Virus! card game."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.1
  flutter_markdown_plus: ^1.0.0

dev_dependencies:
  build_runner: ^2.12.2
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
